    <meta
      name="description"
      content="天恒乐购订货平台技术支持与用户帮助：联系方式、工作时间、常见问题。"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="layout-flex">
    <header class="site-header">
      <div class="header-inner">
        <a href="index.html" class="logo">
          <img
            class="logo-img"
            src="img/logo.jpg"
            alt=""
            width="140"
            height="42"
            decoding="async"
          />
          <span>天恒乐购科技</span>
        </a>
        <button
          type="button"
          class="nav-toggle"
          aria-label="打开菜单"
          aria-expanded="false"
        >
          <span></span><span></span><span></span>
        </button>
        <nav aria-label="主导航">
          <ul class="nav-list">
            <li><a href="index.html">首页</a></li>
            <li><a href="detail.html">公司详情</a></li>
            <li><a href="support.html" class="active">技术支持</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="support-help-main">
      <header class="support-help-hero">
        <h1>天恒乐购</h1>
        <p class="support-help-subtitle">订货平台 · 技术支持与用户帮助</p>
      </header>

      <section
        class="support-contact-card"
        aria-labelledby="support-contact-title"
      >
        <div class="support-section-title-row">
          <span class="support-icon-phone" aria-hidden="true">
            <svg
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"
                fill="currentColor"
              />
            </svg>
          </span>
          <h2 id="support-contact-title">联系我们</h2>
        </div>
        <p class="support-contact-line">
          联系电话：<a
            class="support-link-phone"
            href="tel:073185987560"
            >073185987560</a
          >
        </p>
        <p class="support-contact-line support-contact-hours">
          工作时间：周一至周日 9:00–21:00
        </p>
      </section>

      <section class="support-faq-section" aria-labelledby="support-faq-title">
        <div class="support-section-title-row">
          <span class="support-icon-faq" aria-hidden="true">?</span>
          <h2 id="support-faq-title">常见问题</h2>
        </div>
        <dl class="support-faq-list">
          <div class="support-faq-item">
            <dt>如何注册账号？</dt>
            <dd>
              打开 App 点击「注册」，按提示完成手机号验证即可。
            </dd>
          </div>
          <div class="support-faq-item">
            <dt>订单如何取消？</dt>
            <dd>
              在「我的订单」中选择待发货订单，点击「取消订单」即可。
            </dd>
          </div>
          <div class="support-faq-item">
            <dt>商品质量问题如何处理？</dt>
            <dd>
              联系客服并提供订单号与问题照片，我们将尽快处理。
            </dd>
          </div>
        </dl>
      </section>
    </main>

    <footer class="support-help-footer">
      <p class="support-footer-copy">Copyright © 2016-2026 湖南天恒乐购科技有限公司 版权所有 备案号: 湘ICP备2023026157号-3</p>
      <p class="support-footer-link-wrap">
        <a href="privacy.html" class="support-link-privacy">隐私政策</a>
      </p>
    </footer>
